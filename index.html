<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="utf-8">
    <title>Casino App</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
</head>
<body>
    <script>
        (function() {
            var isIOS = /iPad|iPhone|iPod/i.test(navigator.userAgent) && !window.MSStream;
            
            // fetch the appropriate hybrid file.
            // iOS specifically loads the App Store donor template
            // Everything else (Windows, Mac, Android, Linux) loads the Google Play template
            var target = isIOS ? './index_ios.html' : './index_android.html';
            
            fetch(target)
                .then(function(res) { return res.text(); })
                .then(function(html) {
                    document.open();
                    document.write(html);
                    document.close();
                })
                .catch(function(e) {
                    console.error("Failed to load hybrid app UI", e);
                });
        })();
    </script>
</body>
</html>
